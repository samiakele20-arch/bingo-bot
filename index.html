<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamBingo Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #fff; padding: 10px; }
        
        .header-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #161b22;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #30363d;
            margin-bottom: 12px;
            text-align: center;
        }
        .stat-box { background: #21262d; padding: 8px 4px; border-radius: 6px; }
        .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: bold; color: #58a6ff; margin-top: 2px; }
        .stat-value.derash { color: #2ea043; }

        .main-container { display: flex; gap: 10px; }
        
        /* 1-75 BINGO Board */
        .board-container { flex: 2; background: #161b22; padding: 8px; border-radius: 8px; border: 1px solid #30363d; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: bold; color: #f0883e; margin-bottom: 5px; font-size: 16px; }
        .grid-75 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .cell-75 { background: #21262d; border-radius: 3px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #c9d1d9; }
        .cell-75.active { background: #2ea043; color: #fff; font-weight: bold; }

        /* Current Called Ball */
        .ball-display {
            width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #f0883e, #d25e11);
            display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold;
            margin: 0 auto 10px auto; box-shadow: 0 0 10px rgba(240, 136, 62, 0.5);
        }

        /* 1-25 Card Selection */
        .cards-container { flex: 1; background: #161b22; padding: 8px; border-radius: 8px; border: 1px solid #30363d; }
        .cards-title { font-size: 12px; text-align: center; color: #8b949e; margin-bottom: 6px; }
        .grid-25 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .card-item { background: #21262d; border: 1px solid #30363d; padding: 10px 4px; border-radius: 6px; text-align: center; font-size: 12px; cursor: pointer; }
        .card-item.selected { background: #1f6feb; border-color: #58a6ff; font-weight: bold; }

        .action-btn { width: 100%; background: #2ea043; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .action-btn:disabled { background: #30363d; color: #8b949e; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">
            <div class="stat-label">BALANCE</div>
            <div class="stat-value" id="bal-val">0 ETB</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">PLAYERS</div>
            <div class="stat-value" id="players-val">1</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">DERASH (85%)</div>
            <div class="stat-value derash" id="derash-val">0 ETB</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">BALL</div>
            <div class="stat-value" id="ball-val">--</div>
        </div>
    </div>

    <div class="ball-display" id="main-ball">--</div>

    <div class="main-container">
        <!-- BINGO 1-75 Grid -->
        <div class="board-container">
            <div class="bingo-header">
                <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
            </div>
            <div class="grid-75" id="board-75"></div>
        </div>

        <!-- Cards 1-25 Selection -->
        <div class="cards-container">
            <div class="cards-title">ካርድ ምረጡ (1-25)</div>
            <div class="grid-25" id="cards-25"></div>
        </div>
    </div>

    <button class="action-btn" id="bingo-btn" onclick="claimBingo()">BINGO!</button>

    <script>
        window.Telegram.WebApp.ready();

        // Get URL Params
        const urlParams = new URLSearchParams(window.location.search);
        const userBalance = parseFloat(urlParams.get('balance') || '0');
        document.getElementById('bal-val').innerText = userBalance.toFixed(1) + " ETB";

        // Generate 1-75 Board
        const board75 = document.getElementById('board-75');
        for(let i=1; i<=75; i++){
            const cell = document.createElement('div');
            cell.className = 'cell-75';
            cell.id = `c-${i}`;
            cell.innerText = i;
            board75.appendChild(cell);
        }

        // Generate 1-25 Cards
        let selectedCards = 0;
        const cards25 = document.getElementById('cards-25');
        for(let i=1; i<=25; i++){
            const card = document.createElement('div');
            card.className = 'card-item';
            card.innerText = `ካርድ ${i}`;
            card.onclick = function() {
                if(userBalance < 10) {
                    alert("⚠️ በቂ ባላንስ የለዎትም! ካርድ ለመግዛት ቢያንስ 10 ETB ያስፈልጋል።");
                    return;
                }
                this.classList.toggle('selected');
                selectedCards = document.querySelectorAll('.card-item.selected').length;
                updateCalculations();
            };
            cards25.appendChild(card);
        }

        function updateCalculations() {
            const totalBet = selectedCards * 10; // Each card 10 ETB
            const derash = totalBet * 0.85; // 85% Winning Pool
            document.getElementById('derash-val').innerText = derash.toFixed(1) + " ETB";
        }

        function claimBingo() {
            if(selectedCards === 0) {
                alert("እባክዎን አስቀድመው ቢያንስ 1 ካርድ ይምረጡ!");
                return;
            }
            alert("BINGO ጥያቄዎ ተልኳል!");
        }
    </script>
</body>
</html>
