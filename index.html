<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamBingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .balance-card {
            background: #1f2937;
            border: 2px solid #10b981;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #10b981;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-width: 350px;
            margin: 0 auto;
        }
        .card {
            background-color: #374151;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
        }
        .card:active {
            background-color: #10b981;
        }
    </style>
</head>
<body>

    <h2>🎲 SAMBINGO 🎲</h2>

    <!-- ባላንሱ እዚህ ቦታ ላይ ይታያል -->
    <div class="balance-card">
        💰 BALANCE: <span id="user-balance">0.00</span> ETB
    </div>

    <div class="game-board" id="board">
        <!-- የካርድ ቁጥሮች እዚህ ይፈጠራሉ -->
    </div>

    <script>
        // Telegram WebApp ን ማበራቻ
        window.Telegram.WebApp.ready();

        // ከ URL ላይ ባላንሱን የማንበብ ዘዴ (URL Parameters)
        function getBalanceFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const balance = urlParams.get('balance');
            return balance ? parseFloat(balance).toFixed(2) : "0.00";
        }

        // ገጹ ሲከፈት ባላንሱን ማሳያ
        const currentBalance = getBalanceFromUrl();
        document.getElementById('user-balance').innerText = currentBalance;

        // የቢንጎ ካርዶችን መፍጠሪያ (ለሙከራ)
        const board = document.getElementById('board');
        for (let i = 1; i <= 25; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerText = i;
            card.onclick = function() {
                if (parseFloat(currentBalance) <= 0) {
                    alert("⚠️ በቂ ባላንስ የለዎትም! እባክዎን አስቀድመው ብር ያስገቡ።");
                } else {
                    card.style.backgroundColor = '#10b981';
                }
            };
            board.appendChild(card);
        }
    </script>
</body>
</html>
