<script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    // ከ URL ላይ የነበረውን Balance መቀበያ
    const urlParams = new URLSearchParams(window.location.search);
    let userBalance = parseFloat(urlParams.get('balance')) || 0;

    // Balance ገጽ ላይ ማሳያ
    document.getElementById('balanceVal').innerText = `${userBalance} ETB`;

    let myCards = [];
    let timer = 30;
    let timerInterval = null;

    function initBoard() {
      const ranges = { b: [1, 15], i: [16, 30], n: [31, 45], g: [46, 60], o: [61, 75] };
      for (let k in ranges) {
        const col = document.getElementById(`col-${k}-list`);
        if (!col) continue;
        col.innerHTML = '';
        for (let i = ranges[k][0]; i <= ranges[k][1]; i++) {
          const d = document.createElement('div');
          d.className = 'num-cell';
          d.id = `num-${i}`;
          d.innerText = i;
          col.appendChild(d);
        }
      }
    }

    function initFullCardsPicker() {
      const grid = document.getElementById('cardsGridFull');
      if (!grid) return;
      grid.innerHTML = '';
      for (let i = 1; i <= 250; i++) {
        const btn = document.createElement('div');
        btn.className = 'card-btn';
        btn.innerText = `#${i}`;
        btn.onclick = () => selectCard(btn, i);
        grid.appendChild(btn);
      }
    }

    function selectCard(btn, cardNum) {
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        myCards = myCards.filter(c => c !== cardNum);
      } else {
        if (myCards.length >= 2) {
          alert("ከ 2 ካርድ በላይ መግዛት አይችሉም!");
          return;
        }
        if (userBalance < 10) {
          alert("በቂ ባላንስ የሎትም። እባክዎን አስቀድመው Deposit ያድርጉ!");
          return;
        }
        btn.classList.add('selected');
        myCards.push(cardNum);
      }

      document.getElementById('derashVal').innerText = `${myCards.length * 8} ETB`;
      document.getElementById('playersVal').innerText = myCards.length;

      if (myCards.length > 0 && !timerInterval) {
        startCountdown();
      }
    }

    function startCountdown() {
      timer = 30;
      const banner = document.getElementById('statusBanner');
      timerInterval = setInterval(() => {
        timer--;
        if (banner) banner.innerText = `⏳ ጨዋታው ለመጀመር: ${timer} ሰከንድ`;
        if (timer <= 0) {
          clearInterval(timerInterval);
          startGameplay();
        }
      }, 1000);
    }

    function startGameplay() {
      document.getElementById('buyingScreen').style.display = 'none';
      document.getElementById('playingScreen').style.display = 'flex';
      document.getElementById('statusBanner').innerText = "🎲 ጨዋታው ተጀምሯል!";
      renderMyCardsOnRight();
    }

    function renderMyCardsOnRight() {
      const container = document.getElementById('mySelectedCardsContainer');
      if (!container) return;
      container.innerHTML = '';
      myCards.forEach(cardNum => {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'bingo-card';
        cardDiv.id = `card-box-${cardNum}`;
        cardDiv.innerHTML = `
          <div style="background:#0284c7; color:#fff; text-align:center; font-size:10px; font-weight:bold;">CARD #${cardNum}</div>
          <div class="card-header"><div class="col-b">B</div><div class="col-i">I</div><div class="col-n">N</div><div class="col-g">G</div><div class="col-o">O</div></div>
          <div class="card-grid-5x5">
            ${Array.from({length: 25}).map((_, i) => `<div class="cell-5x5 ${i===12?'star':''}">${i===12?'★':Math.floor(Math.random()*75)+1}</div>`).join('')}
          </div>
        `;
        container.appendChild(cardDiv);
      });
    }

    function claimBingo() {
      if (tg) tg.sendData(JSON.stringify({ action: "bingo_claim", cards: myCards }));
    }

    initBoard();
    initFullCardsPicker();
  </script>
