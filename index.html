<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SamBingo Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #0f172a; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Top Stats Bar */
    .top-bar { display: flex; justify-content: space-between; background-color: #1e293b; padding: 6px; font-size: 11px; font-weight: bold; border-bottom: 2px solid #334155; gap: 4px; }
    .stat-box { background: #090d16; padding: 4px; border-radius: 6px; text-align: center; border: 1px solid #334155; flex: 1; }
    .stat-label { color: #94a3b8; font-size: 8px; display: block; }
    .stat-value { color: #22c55e; font-size: 11px; }

    .balance-box { background: #064e3b; border-color: #059669; }
    .balance-box .stat-label { color: #d1fae5; }
    .balance-box .stat-value { color: #ffffff; }

    .status-banner { background: #d97706; color: #fff; text-align: center; padding: 5px; font-size: 12px; font-weight: bold; }

    /* App Layout */
    .app-body { display: flex; flex: 1; overflow: hidden; padding: 4px; gap: 6px; height: 100%; position: relative; }

    /* FULL SCREEN BUYING */
    #buyingScreen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 5px; }
    .picker-title { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #cbd5e1; }
    .cards-grid-full { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; flex: 1; overflow-y: auto; padding-bottom: 20px; }
    .card-btn { background: #1e293b; border: 1px solid #475569; color: #fff; padding: 10px 0; text-align: center; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
    .card-btn.selected { background: #22c55e; border-color: #4ade80; color: #000; font-size: 13px; }

    /* GAME PLAY SCREEN */
    #playingScreen { display: none; width: 100%; height: 100%; gap: 6px; }

    /* Left Side: 1-75 Numbers Board (85% Height) */
    .board-85 { width: 45%; height: 85vh; display: flex; flex-direction: column; background: #1e293b; border-radius: 8px; padding: 3px; }
    .bingo-cols { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; height: 100%; }
    .col { display: flex; flex-direction: column; gap: 2px; height: 100%; }
    .col-header { text-align: center; font-weight: 900; padding: 3px 0; border-radius: 3px; font-size: 11px; color: #fff; }
    
    .col-b { background-color: #2563eb; }
    .col-i { background-color: #dc2626; }
    .col-n { background-color: #d97706; }
    .col-g { background-color: #16a34a; }
    .col-o { background-color: #9333ea; }

    .num-cell { background: #334155; text-align: center; font-size: 10px; flex: 1; display: flex; align-items: center; justify-content: center; border-radius: 2px; font-weight: bold; }
    .num-cell.called { background: #eab308; color: #000; font-size: 11px; }

    /* Right Side: Selected Cards View */
    .right-cards-area { width: 55%; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
    .bingo-card { width: 100%; background: #ffffff; color: #000; border-radius: 6px; overflow: hidden; margin-bottom: 8px; position: relative; }
    .card-header { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: bold; font-size: 10px; color: #fff; }
    .card-grid-5x5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; padding: 2px; background: #cbd5e1; }
    .cell-5x5 { background: #fff; height: 26px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; border-radius: 2px; }
    .cell-5x5.matched { background: #22c55e; color: #fff; }
    .cell-5x5.star { background: #3b82f6; color: #fff; }

    .blocked-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(220, 38, 38, 0.85); color: #fff; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; z-index: 10; }
    .btn-bingo-claim { width: 100%; padding: 10px; background: #0284c7; color: white; border: none; font-weight: bold; font-size: 14px; border-radius: 6px; cursor: pointer; }

    /* WINNER DIALOG POPUP */
    .winner-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center; padding: 15px; }
    .winner-card-box { background: #ffffff; color: #000; border-radius: 16px; width: 100%; max-width: 320px; padding: 15px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .winner-title { font-size: 18px; font-weight: 900; color: #16a34a; margin-bottom: 5px; }
    .prize-pool-box { background: #f1f5f9; padding: 8px; border-radius: 8px; margin: 10px 0; }
    .prize-pool-amount { font-size: 20px; font-weight: bold; color: #15803d; }
    .next-round-bar { background: #eab308; color: #000; font-weight: bold; padding: 6px; border-radius: 20px; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="stat-box"><span class="stat-label">DERASH</span><span class="stat-value" id="derashVal">0 ETB</span></div>
    <div class="stat-box"><span class="stat-label">BALLS</span><span class="stat-value" id="ballsVal">0/75</span></div>
    <div class="stat-box"><span class="stat-label">PLAYERS</span><span class="stat-value" id="playersVal">0</span></div>
    <div class="stat-box balance-box"><span class="stat-label">BALANCE</span><span class="stat-value" id="balanceVal">0 ETB</span></div>
  </div>

  <div class="status-banner" id="statusBanner">🎮 ካርድ ይምረጡ (10 ETB)</div>

  <div class="app-body">
    <!-- BUYING SCREEN -->
    <div id="buyingScreen">
      <div class="picker-title">የካርድ ቁጥር ይምረጡ (1 - 250)</div>
      <div class="cards-grid-full" id="cardsGridFull"></div>
    </div>

    <!-- GAME PLAY SCREEN -->
    <div id="playingScreen">
      <div class="board-85">
        <div class="bingo-cols">
          <div class="col"><div class="col-header col-b">B</div><div id="col-b-list" class="col"></div></div>
          <div class="col"><div class="col-header col-i">I</div><div id="col-i-list" class="col"></div></div>
          <div class="col"><div class="col-header col-n">N</div><div id="col-n-list" class="col"></div></div>
          <div class="col"><div class="col-header col-g">G</div><div id="col-g-list" class="col"></div></div>
          <div class="col"><div class="col-header col-o">O</div><div id="col-o-list" class="col"></div></div>
        </div>
      </div>

      <div class="right-cards-area">
        <div id="mySelectedCardsContainer" style="width: 100%;"></div>
        <button class="btn-bingo-claim" onclick="claimBingo()">BINGO!</button>
      </div>
    </div>

    <!-- WINNER DIALOG POPUP -->
    <div class="winner-modal" id="winnerModal">
      <div class="winner-card-box">
        <div style="font-size: 14px; font-weight: bold; color: #dc2626;" id="winnerRank">1 አሸናፊ</div>
        <div class="winner-title" id="winnerName">Sam 🤪 has won!</div>
        <div class="prize-pool-box">
          <div style="font-size: 10px; color: #64748b;">TOTAL PRIZE POOL</div>
          <div class="prize-pool-amount" id="winnerPrize">1024 ETB</div>
        </div>
        <div style="font-size: 12px; font-weight: bold; color: #2563eb; text-align: left; margin-bottom: 4px;" id="winnerCardNum">CARD #391</div>
        <div class="card-grid-5x5" id="winnerCardGrid"></div>
        <div class="next-round-bar" id="nextRoundText">NEXT ROUND: 10S</div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    let userBalance = 0;
    let myCards = [];
    let timer = 30;
    let timerInterval = null;

    function initBoard() {
      const ranges = { b: [1, 15], i: [16, 30], n: [31, 45], g: [46, 60], o: [61, 75] };
      for (let k in ranges) {
        const col = document.getElementById(`col-${k}-list`);
        if (!col) continue;
        col.innerHTML = '';
        for (let i = ranges[k][0]; i <= ranges[k][1]; i++) {
          const d = document.createElement('div');
          d.className = 'num-cell';
          d.id = `num-${i}`;
          d.innerText = i;
          col.appendChild(d);
        }
      }
    }

    function initFullCardsPicker() {
      const grid = document.getElementById('cardsGridFull');
      if (!grid) return;
      grid.innerHTML = '';
      for (let i = 1; i <= 250; i++) {
        const btn = document.createElement('div');
        btn.className = 'card-btn';
        btn.innerText = `#${i}`;
        btn.onclick = () => selectCard(btn, i);
        grid.appendChild(btn);
      }
    }

    function selectCard(btn, cardNum) {
      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        myCards = myCards.filter(c => c !== cardNum);
      } else {
        if (myCards.length >= 2) {
          alert("ከ 2 ካርድ በላይ መግዛት አይችሉም!");
          return;
        }
        btn.classList.add('selected');
        myCards.push(cardNum);
      }

      document.getElementById('derashVal').innerText = `${myCards.length * 8} ETB`;
      document.getElementById('playersVal').innerText = myCards.length;

      if (myCards.length > 0 && !timerInterval) {
        startCountdown();
      }
    }

    function startCountdown() {
      timer = 30;
      const banner = document.getElementById('statusBanner');
      timerInterval = setInterval(() => {
        timer--;
        if (banner) banner.innerText = `⏳ ጨዋታው ለመጀመር: ${timer} ሰከንድ`;
        if (timer <= 0) {
          clearInterval(timerInterval);
          startGameplay();
        }
      }, 1000);
    }

    function startGameplay() {
      document.getElementById('buyingScreen').style.display = 'none';
      document.getElementById('playingScreen').style.display = 'flex';
      document.getElementById('statusBanner').innerText = "🎲 ጨዋታው ተጀምሯል!";
      renderMyCardsOnRight();
    }

    function renderMyCardsOnRight() {
      const container = document.getElementById('mySelectedCardsContainer');
      if (!container) return;
      container.innerHTML = '';
      myCards.forEach(cardNum => {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'bingo-card';
        cardDiv.id = `card-box-${cardNum}`;
        cardDiv.innerHTML = `
          <div style="background:#0284c7; color:#fff; text-align:center; font-size:10px; font-weight:bold;">CARD #${cardNum}</div>
          <div class="card-header"><div class="col-b">B</div><div class="col-i">I</div><div class="col-n">N</div><div class="col-g">G</div><div class="col-o">O</div></div>
          <div class="card-grid-5x5">
            ${Array.from({length: 25}).map((_, i) => `<div class="cell-5x5 ${i===12?'star':''}">${i===12?'★':Math.floor(Math.random()*75)+1}</div>`).join('')}
          </div>
        `;
        container.appendChild(cardDiv);
      });
    }

    function claimBingo() {
      if (tg) tg.sendData(JSON.stringify({ action: "bingo_claim", cards: myCards }));
    }

    initBoard();
    initFullCardsPicker();
  </script>
</body>
</html>
