<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SamBingo Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #0f172a; color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Top Stats Bar */
    .top-bar { display: flex; justify-content: space-between; background-color: #1e293b; padding: 8px 12px; font-size: 12px; font-weight: bold; border-bottom: 2px solid #334155; }
    .stat-box { background: #090d16; padding: 5px 10px; border-radius: 6px; text-align: center; border: 1px solid #334155; }
    .stat-label { color: #94a3b8; font-size: 9px; display: block; margin-bottom: 2px; }
    .stat-value { color: #22c55e; font-size: 13px; }

    /* Banner / Timer Message */
    .status-banner { background: #d97706; color: #fff; text-align: center; padding: 6px; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }

    /* Main App Layout */
    .app-body { display: flex; flex: 1; overflow: hidden; padding: 4px; gap: 6px; }

    /* 1-75 Numbers Board (Left Column) - ENLARGED */
    .board-75 { width: 42%; display: flex; flex-direction: column; background: #1e293b; border-radius: 8px; padding: 4px; }
    .bingo-cols { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; height: 100%; }
    .col { display: flex; flex-direction: column; gap: 3px; }
    .col-header { text-align: center; font-weight: 900; padding: 5px 0; border-radius: 4px; font-size: 14px; color: #fff; }
    
    /* Column Colors */
    .col-b { background-color: #2563eb; }
    .col-i { background-color: #dc2626; }
    .col-n { background-color: #d97706; }
    .col-g { background-color: #16a34a; }
    .col-o { background-color: #9333ea; }

    .num-cell { background: #334155; text-align: center; font-size: 12px; padding: 4px 0; border-radius: 3px; font-weight: bold; color: #e2e8f0; }
    .num-cell.called { background: #eab308; color: #000; box-shadow: 0 0 5px #eab308; }

    /* Main Area (Right Side) */
    .main-area { width: 58%; display: flex; flex-direction: column; align-items: center; padding: 2px; overflow-y: auto; }

    /* Cards 1 - 250 Selection Grid */
    .picker-header { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #cbd5e1; text-align: center; }
    .cards-grid-250 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; max-height: 80vh; overflow-y: auto; padding-right: 4px; }
    .card-btn { background: #1e293b; border: 1px solid #475569; color: #fff; padding: 10px 0; text-align: center; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
    .card-btn.selected { background: #22c55e; border-color: #4ade80; color: #000; font-size: 13px; }

    /* Game Play View (Active Card) */
    .bingo-card { width: 100%; max-width: 250px; background: #ffffff; color: #000; border-radius: 8px; overflow: hidden; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .card-header { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: bold; font-size: 13px; color: #fff; }
    .card-grid-5x5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; padding: 4px; background: #cbd5e1; }
    .cell-5x5 { background: #fff; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; border-radius: 2px; cursor: pointer; }
    .cell-5x5.matched { background: #22c55e; color: #fff; }
    .cell-5x5.star { background: #3b82f6; color: #fff; font-size: 16px; }

    .btn-bingo-claim { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; font-weight: bold; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 8px; }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <div class="top-bar">
    <div class="stat-box">
      <span class="stat-label">DERASH</span>
      <span class="stat-value" id="derashVal">0 ETB</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">BALLS</span>
      <span class="stat-value" id="ballsVal">0/75</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">PLAYERS</span>
      <span class="stat-value" id="playersVal">0</span>
    </div>
  </div>

  <!-- Dynamic Banner -->
  <div class="status-banner" id="statusBanner">🎮 ካርድ ይምረጡ (10 ETB)</div>

  <div class="app-body">
    <!-- Enlarged 1-75 Numbers Board -->
    <div class="board-75">
      <div class="bingo-cols">
        <div class="col"><div class="col-header col-b">B</div><div id="col-b-list"></div></div>
        <div class="col"><div class="col-header col-i">I</div><div id="col-i-list"></div></div>
        <div class="col"><div class="col-header col-n">N</div><div id="col-n-list"></div></div>
        <div class="col"><div class="col-header col-g">G</div><div id="col-g-list"></div></div>
        <div class="col"><div class="col-header col-o">O</div><div id="col-o-list"></div></div>
      </div>
    </div>

    <!-- Main Game Area -->
    <div class="main-area">
      <!-- 1-250 Cards Buying Screen -->
      <div id="buyingScreen" style="width: 100%;">
        <div class="picker-header">የካርድ ቁጥር ይምረጡ (ከ 1 - 250)</div>
        <div class="cards-grid-250" id="cardsGrid250"></div>
      </div>

      <!-- Live Gameplay Screen -->
      <div id="playingScreen" style="display: none; width: 100%;">
        <div class="bingo-card">
          <div class="card-header">
            <div class="col-b">B</div>
            <div class="col-i">I</div>
            <div class="col-n">N</div>
            <div class="col-g">G</div>
            <div class="col-o">O</div>
          </div>
          <div class="card-grid-5x5" id="cardGrid5x5"></div>
        </div>
        <button class="btn-bingo-claim" onclick="claimBingo()">BINGO!</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    let myCards = [];
    let timer = 30;
    let timerInterval = null;
    let gameStarted = false;

    // Init Left Board (1-75)
    function initBoard() {
      const ranges = { b: [1, 15], i: [16, 30], n: [31, 45], g: [46, 60], o: [61, 75] };
      for (let k in ranges) {
        const col = document.getElementById(`col-${k}-list`);
        col.innerHTML = '';
        for (let i = ranges[k][0]; i <= ranges[k][1]; i++) {
          const d = document.createElement('div');
          d.className = 'num-cell';
          d.id = `num-${i}`;
          d.innerText = i;
          col.appendChild(d);
        }
      }
    }

    // Generate 1 - 250 Cards Selector
    function init250Cards() {
      const grid = document.getElementById('cardsGrid250');
      grid.innerHTML = '';
      for (let i = 1; i <= 250; i++) {
        const btn = document.createElement('div');
        btn.className = 'card-btn';
        btn.innerText = `#${i}`;
        btn.onclick = () => selectCard(btn, i);
        grid.appendChild(btn);
      }
    }

    // Card Selection Logic & Timer Trigger
    function selectCard(btn, cardNum) {
      if (gameStarted) return;

      if (btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        myCards = myCards.filter(c => c !== cardNum);
      } else {
        if (myCards.length >= 2) {
          alert("ከ 2 ካርድ በላይ መግዛት አይችሉም!");
          return;
        }
        btn.classList.add('selected');
        myCards.push(cardNum);
      }

      updateDerashAndStats();

      // Start 30s Countdown when first card is picked
      if (myCards.length > 0 && !timerInterval) {
        startCountdown();
      }
    }

    function updateDerashAndStats() {
      let count = myCards.length;
      document.getElementById('derashVal').innerText = `${count * 8} ETB`;
      document.getElementById('playersVal').innerText = count > 0 ? 1 : 0;
    }

    function startCountdown() {
      timer = 30;
      const banner = document.getElementById('statusBanner');
      timerInterval = setInterval(() => {
        timer--;
        banner.innerText = `⏳ ጨዋታው ለመጀመር: ${timer} ሰከንድ`;
        
        if (timer <= 0) {
          clearInterval(timerInterval);
          startGameplay();
        }
      }, 1000);
    }

    function startGameplay() {
      gameStarted = true;
      document.getElementById('buyingScreen').style.display = 'none';
      document.getElementById('playingScreen').style.display = 'flex';
      document.getElementById('statusBanner').innerText = "🎲 ጨዋታው ተጀምሯል!";
      
      renderActiveCard();
    }

    function renderActiveCard() {
      const grid = document.getElementById('cardGrid5x5');
      grid.innerHTML = '';
      
      // Dummy 5x5 Grid Numbers Generation
      for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell-5x5';
        if (i === 12) {
          cell.innerText = '★';
          cell.classList.add('star');
        } else {
          cell.innerText = Math.floor(Math.random() * 75) + 1;
        }
        grid.appendChild(cell);
      }
    }

    function claimBingo() {
      if (tg) tg.sendData(JSON.stringify({ action: "bingo_claim", cards: myCards }));
      alert("🎉 BINGO ጥያቄዎ ተልኳል!");
    }

    initBoard();
    init250Cards();
  </script>
</body>
</html>
